name: Build and Release

# The script runs when a tag is created, for example: git tag v3.0.0 && git push origin v3.0.0
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # 1. Running tests and generating PDFs
  test-and-prep:
    name: Test and Prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod" # Takes the Go version from go.mod

      - name: Run Tests
        run: make test

      - name: Setup Node.js (for md-to-pdf)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate PDF from README
        run: |
          npm install -g md-to-pdf
          md-to-pdf README.md
          mv README.pdf Readme.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: readme-pdf
          path: Readme.pdf

  # 2. Assembly for all platforms
  build:
    name: Build ${{ matrix.name }}
    needs: test-and-prep
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Configuring the OS runner and target Go-architecture
        include:
          - os: windows-latest
            goarch: amd64
            name: win_x64
          - os: windows-latest
            goarch: 386
            name: win32
          - os: windows-latest
            goarch: arm64
            name: win_arm64
          - os: macos-latest
            goarch: arm64
            name: macOS_arm64
          - os: macos-latest
            goarch: amd64
            name: macOS_x64
          - os: ubuntu-latest
            goarch: amd64
            name: linux_x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Download Readme.pdf
        uses: actions/download-artifact@v4
        with:
          name: readme-pdf
          path: .

      - name: Build Binary
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0 # Disable CGO for cross-compilation
        run: make build

      - name: Move Readme.pdf to dist
        shell: bash
        run: mv Readme.pdf dist/

      - name: Extract Version
        id: get_version
        shell: bash
        run: |
          # Converting tag 'v3.0.0' в '3_0_0'
          VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//' | tr '.' '_')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Zip output
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: "zip"
          directory: "dist"
          filename: "../whatsapp_jpeg_repair_${{ env.VERSION }}_${{ matrix.name }}.zip"

      - name: Upload Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.name }}
          path: whatsapp_jpeg_repair_${{ env.VERSION }}_${{ matrix.name }}.zip

  # 3. Publishing release to GitHub
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create release
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: artifact-*
          merge-multiple: true

      - name: Extract Version
        id: get_version
        run: |
          VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//' | tr '.' '_')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate Release Notes
        run: |
          cat <<EOF > release_notes.md
          ## Release ${{ github.ref_name }}

          ### Which file should I download?

          | Operating System | Platform                                                    | Which file should I download?              |
          | ---------------- | ----------------------------------------------------------- | ------------------------------------------ |
          | Windows 64-bit   | Intel/AMD PC and Laptops                                    | whatsapp_jpeg_repair_${{ env.VERSION }}_win_x64.zip      |
          | Windows 32-bit   | Intel/AMD PC and Laptops                                    | whatsapp_jpeg_repair_${{ env.VERSION }}_win32.zip        |
          | Windows          | New ARM Laptops (Microsoft Surface, Asus Zenbook A14, etc.) | whatsapp_jpeg_repair_${{ env.VERSION }}_win_arm64.zip    |
          | macOS            | Apple Silicon (M1/M2/M3/etc)                                | whatsapp_jpeg_repair_${{ env.VERSION }}_macOS_arm64.zip  |
          | macOS            | Intel Processor                                             | whatsapp_jpeg_repair_${{ env.VERSION }}_macOS_x64.zip    |
          | Linux 64-bit     | Intel/AMD PC and Laptops                                    | whatsapp_jpeg_repair_${{ env.VERSION }}_linux_x64.zip    |
          EOF

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: artifacts/*.zip
