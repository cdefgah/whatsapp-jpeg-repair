name: Build and Release

on:
  push:
    tags:
      - "v*.*.*" # will trigger when a tag is pushed, like v3.0.0

jobs:
  test-and-prep:
    name: Test, Lint and Prepare PDF
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Run Tests
        run: make test

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1
          # The installation mode `goinstall` always uses `CGO_ENABLED=1`.
          install-mode: goinstall

      - name: Setup Node.js (for md-to-pdf)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate PDF from README
        run: |
          npm install -g md-to-pdf
          # Creating a configuration to run Chromium without a sandbox (addresses the No usable sandbox error)
          echo '{"launch_options": {"args": ["--no-sandbox", "--disable-setuid-sandbox"]}}' > pdf-config.json
          md-to-pdf --config-file pdf-config.json README.md
          mv README.pdf Readme.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: readme-pdf
          path: Readme.pdf

  build:
    name: Build ${{ matrix.name }}
    needs: test-and-prep
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            name: win_x64
          - os: windows-latest
            goos: windows
            goarch: 386
            name: win32
          - os: windows-latest
            goos: windows
            goarch: arm64
            name: win_arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            name: macOS_arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            name: macOS_x64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            name: linux_x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Download Readme.pdf artifact
        uses: actions/download-artifact@v4
        with:
          name: readme-pdf
          path: .

      - name: Extract Version
        id: get_version
        shell: bash
        run: |
          # Converting v3.0.0 в 3_0_0
          VERSION_CLEAN=$(echo ${{ github.ref_name }} | sed 's/^v//' | tr '.' '_')
          echo "VERSION_CLEAN=$VERSION_CLEAN" >> $GITHUB_ENV

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: make build

      - name: Copy PDF to dist
        shell: bash
        run: cp Readme.pdf dist/

      - name: Create Zip Archive
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: "zip"
          directory: "dist"
          filename: "../whatsapp_jpeg_repair_${{ env.VERSION_CLEAN }}_${{ matrix.name }}.zip"

      - name: Upload Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.name }}
          path: whatsapp_jpeg_repair_${{ env.VERSION_CLEAN }}_${{ matrix.name }}.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all zips
        uses: actions/download-artifact@v4
        with:
          path: all_zips
          pattern: zip-*
          merge-multiple: true

      - name: Prepare Version Strings
        run: |
          # VERSION_CLEAN for file names (3_0_0)
          echo "VERSION_CLEAN=$(echo ${{ github.ref_name }} | sed 's/^v//' | tr '.' '_')" >> $GITHUB_ENV
          # VERSION_DISPLAY for title (3.0.0)
          echo "VERSION_DISPLAY=$(echo ${{ github.ref_name }} | sed 's/^v//')" >> $GITHUB_ENV

      - name: Generate Release Table
        run: |
          cat <<EOF > release_notes.md

          **[What's new in this release](https://github.com/cdefgah/whatsapp-jpeg-repair/blob/master/CHANGELOG.md)**

          ### Which file should I download?

          | Operating System | Platform | Which file should I download? |
          | ---------------- | ----------------------------------------------------------- | ------------------------------------------ |
          | Windows 64-bit   | Intel/AMD PC and Laptops | whatsapp_jpeg_repair_${{ env.VERSION_CLEAN }}_win_x64.zip |
          | Windows 32-bit   | Intel/AMD PC and Laptops | whatsapp_jpeg_repair_${{ env.VERSION_CLEAN }}_win32.zip |
          | Windows | New ARM Laptops (Microsoft Surface, Asus Zenbook A14, etc.) | whatsapp_jpeg_repair_${{ env.VERSION_CLEAN }}_win_arm64.zip |
          | macOS | Apple Silicon (M1/M2/M3/etc) | whatsapp_jpeg_repair_${{ env.VERSION_CLEAN }}_macOS_arm64.zip |
          | macOS | Intel Processor | whatsapp_jpeg_repair_${{ env.VERSION_CLEAN }}_macOS_x64.zip |
          | Linux 64-bit | Intel/AMD PC and Laptops | whatsapp_jpeg_repair_${{ env.VERSION_CLEAN }}_linux_x64.zip |
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: all_zips/*.zip
          name: "WhatsApp Jpeg Image Repair. Version ${{ env.VERSION_DISPLAY }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
